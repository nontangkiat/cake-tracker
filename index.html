<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cake Order Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF6EE; --warm-white: #FEFCF8;
    --brown-dark: #2C1A0E; --brown-mid: #6B3F1F; --brown-light: #C4955A;
    --accent: #E8703A; --accent-soft: #F5C4A0;
    --samyan-bg: #FFF0E6; --samyan-text: #8B3A0F; --samyan-dot: #E8703A;
    --ratch-bg: #E8F4EC; --ratch-text: #1A5C2E; --ratch-dot: #2E9E54;
    --border: rgba(44,26,14,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--brown-dark); min-height: 100vh; }

  /* LOGIN */
  #login-screen { position: fixed; inset: 0; background: var(--brown-dark); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .login-box { background: var(--warm-white); border-radius: 20px; padding: 48px 40px; width: 340px; text-align: center; }
  .login-logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--brown-dark); margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--brown-light); margin-bottom: 32px; letter-spacing: 0.05em; text-transform: uppercase; }
  .login-box input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; background: var(--cream); color: var(--brown-dark); text-align: center; letter-spacing: 0.15em; outline: none; transition: border-color 0.2s; margin-bottom: 12px; }
  .login-box input:focus { border-color: var(--accent); }
  .login-btn { width: 100%; padding: 12px; background: var(--brown-dark); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
  .login-btn:hover { background: var(--brown-mid); }
  .login-error { font-size: 12px; color: #C0392B; margin-top: 10px; min-height: 16px; }

  /* HEADER */
  header { background: var(--brown-dark); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--warm-white); }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .last-updated { font-size: 12px; color: rgba(255,255,255,0.45); }
  .refresh-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: white; padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { background: rgba(255,255,255,0.18); }
  .refresh-btn svg { width: 14px; height: 14px; }

  /* MAIN */
  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .metric-card { background: var(--warm-white); border-radius: 16px; padding: 20px 22px; border: 1px solid var(--border); }
  .metric-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--brown-light); margin-bottom: 8px; }
  .metric-value { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--brown-dark); line-height: 1; margin-bottom: 4px; }
  .metric-sub { font-size: 12px; color: var(--brown-light); }

  /* TABS */
  .tab-row { display: flex; gap: 4px; margin-bottom: 24px; background: var(--warm-white); border-radius: 12px; padding: 4px; border: 1px solid var(--border); width: fit-content; }
  .tab { padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--brown-light); font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .tab.active { background: var(--brown-dark); color: white; }

  /* CALENDAR */
  .cal-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .month-nav { display: flex; align-items: center; gap: 12px; }
  .nav-btn { width: 34px; height: 34px; border-radius: 8px; background: var(--warm-white); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--brown-dark); font-size: 16px; transition: all 0.2s; }
  .nav-btn:hover { background: var(--brown-dark); color: white; border-color: var(--brown-dark); }
  .month-label { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--brown-dark); min-width: 180px; text-align: center; }
  .legend { display: flex; gap: 16px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--brown-mid); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .cal-wrap { background: var(--warm-white); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--brown-dark); padding: 10px 0; }
  .cal-weekdays span { text-align: center; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; color: rgba(255,255,255,0.6); text-transform: uppercase; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); }
  .cal-cell { background: var(--warm-white); min-height: 90px; padding: 8px; }
  .cal-cell.empty { background: var(--cream); }
  .cal-cell.today { background: #FFF8F2; }
  .day-num { font-size: 12px; font-weight: 500; color: var(--brown-light); margin-bottom: 4px; }
  .cal-cell.today .day-num { color: var(--accent); font-weight: 600; }
  .order-pill { font-size: 10px; padding: 2px 7px; border-radius: 4px; margin-bottom: 2px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.6; cursor: pointer; transition: opacity 0.15s; }
  .order-pill:hover { opacity: 0.75; }
  .pill-samyan { background: var(--samyan-bg); color: var(--samyan-text); }
  .pill-ratch { background: var(--ratch-bg); color: var(--ratch-text); }

  /* LIST */
  .list-controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .list-controls select { padding: 8px 12px; border-radius: 9px; border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--warm-white); color: var(--brown-dark); cursor: pointer; outline: none; }
  .list-count { font-size: 13px; color: var(--brown-light); margin-left: auto; }
  .orders-table { background: var(--warm-white); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
  .table-header { display: grid; grid-template-columns: 80px 130px 130px 80px 160px 80px 80px; padding: 10px 16px; background: var(--cream); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--brown-light); gap: 8px; }
  .table-row { display: grid; grid-template-columns: 80px 130px 130px 80px 160px 80px 80px; padding: 10px 16px; font-size: 12px; border-bottom: 0.5px solid var(--border); align-items: center; cursor: pointer; gap: 8px; transition: background 0.15s; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--cream); }
  .branch-tag { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; }
  .tag-samyan { background: var(--samyan-bg); color: var(--samyan-text); }
  .tag-ratch { background: var(--ratch-bg); color: var(--ratch-text); }
  .cell-truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(44,26,14,0.5); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--warm-white); border-radius: 20px; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; padding: 28px; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; background: var(--cream); border: none; cursor: pointer; font-size: 18px; color: var(--brown-mid); display: flex; align-items: center; justify-content: center; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 4px; }
  .modal-date { font-size: 13px; color: var(--brown-light); margin-bottom: 20px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-field { padding: 12px 14px; background: var(--cream); border-radius: 10px; }
  .modal-field.full { grid-column: 1/-1; }
  .modal-field-label { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--brown-light); margin-bottom: 4px; font-weight: 500; }
  .modal-field-value { font-size: 13px; color: var(--brown-dark); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .modal-price-row { display: flex; gap: 8px; margin-top: 16px; }
  .modal-price-item { flex: 1; padding: 12px 14px; background: var(--cream); border-radius: 10px; text-align: center; }
  .modal-price-label { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--brown-light); margin-bottom: 4px; }
  .modal-price-value { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--brown-dark); }
  .modal-price-item.total { background: var(--brown-dark); }
  .modal-price-item.total .modal-price-label { color: rgba(255,255,255,0.6); }
  .modal-price-item.total .modal-price-value { color: white; }

  /* CHART */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-card { background: var(--warm-white); border-radius: 16px; border: 1px solid var(--border); padding: 24px; }
  .chart-card h3 { font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--brown-light); margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }

  /* LOADING */
  .loading { text-align: center; padding: 60px 20px; color: var(--brown-light); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }

  @media (max-width: 900px) {
    main { padding: 16px; }
    .metrics { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .charts-grid { grid-template-columns: 1fr; }
    .table-header, .table-row { grid-template-columns: 75px 110px 1fr 70px 70px; }
    .table-header span:nth-child(5), .table-row span:nth-child(5),
    .table-header span:nth-child(6), .table-row span:nth-child(6),
    .table-header span:nth-child(7), .table-row span:nth-child(7) { display: none; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🎂 Cake Tracker</div>
    <div class="login-sub">Staff Access Only</div>
    <input type="password" id="pw-input" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="login-btn" onclick="checkPw()">เข้าสู่ระบบ</button>
    <div class="login-error" id="pw-error"></div>
  </div>
</div>

<header>
  <div class="logo">🎂 Cake <span>Tracker</span></div>
  <div class="header-right">
    <span class="last-updated" id="last-updated">–</span>
    <button class="refresh-btn" onclick="loadAllData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 1 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Refresh
    </button>
  </div>
</header>

<main id="main-content">
  <div class="loading" id="loading-state">
    <div class="spinner"></div>
    กำลังโหลดข้อมูลจาก Google Sheets...
  </div>

  <div id="dashboard" class="hidden">
    <div class="metrics" id="metrics-row"></div>

    <div class="tab-row">
      <button class="tab active" onclick="switchTab('cal',this)">📅 ปฏิทิน</button>
      <button class="tab" onclick="switchTab('list',this)">📋 รายการ</button>
      <button class="tab" onclick="switchTab('chart',this)">📊 สถิติ</button>
    </div>

    <div id="tab-cal">
      <div class="cal-controls">
        <div class="month-nav">
          <button class="nav-btn" onclick="prevMonth()">‹</button>
          <div class="month-label" id="month-label"></div>
          <button class="nav-btn" onclick="nextMonth()">›</button>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--samyan-dot)"></div>Samyan</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--ratch-dot)"></div>Ratchaphruek</div>
        </div>
      </div>
      <div class="cal-wrap">
        <div class="cal-weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <div id="tab-list" class="hidden">
      <div class="list-controls">
        <select id="f-branch" onchange="renderList()">
          <option value="">ทุกสาขา</option>
          <option value="Samyan">Samyan</option>
          <option value="Ratchaphruek">Ratchaphruek</option>
        </select>
        <select id="f-month" onchange="renderList()">
          <option value="">ทุกเดือน</option>
          <option value="4">เมษายน</option>
          <option value="5">พฤษภาคม</option>
          <option value="6">มิถุนายน</option>
        </select>
        <span class="list-count" id="list-count"></span>
      </div>
      <div class="orders-table">
        <div class="table-header">
          <span>วันที่</span><span>สาขา</span><span>ลูกค้า</span><span>ขนาด</span><span>รสชาติ</span><span>Staff</span><span>Total</span>
        </div>
        <div id="list-body"></div>
      </div>
    </div>

    <div id="tab-chart" class="hidden">
      <div class="charts-grid">
        <div class="chart-card"><h3>ออเดอร์รายวัน</h3><div class="chart-wrap"><canvas id="c-daily" role="img" aria-label="Daily orders"></canvas></div></div>
        <div class="chart-card"><h3>แยกตามสาขา รายเดือน</h3><div class="chart-wrap"><canvas id="c-branch" role="img" aria-label="Branch monthly"></canvas></div></div>
        <div class="chart-card"><h3>ยอดขาย (฿) รายเดือน</h3><div class="chart-wrap"><canvas id="c-rev" role="img" aria-label="Revenue"></canvas></div></div>
        <div class="chart-card"><h3>ขนาดเค้กยอดนิยม</h3><div class="chart-wrap"><canvas id="c-size" role="img" aria-label="Cake sizes"></canvas></div></div>
      </div>
    </div>
  </div>
</main>

<div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SHEET_ID = '1pPtrRGeTNwiSDQ830JKzOxpoCk0UZGvvo7dBorcC6RM';
// Tab name → headers count (parsedNumHeaders from gviz)
const TABS = [
  { name: 'Cake orders',      headers: 4 },
  { name: 'May Cake orders',  headers: 4 },
  { name: 'June Cake orders', headers: 1 },
];
const PASSWORD = 'cake2026';

let ALL_ORDERS = [];
let curYear = 2026, curMonth = 6;
let chartsBuilt = false;

function checkPw() {
  if (document.getElementById('pw-input').value === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    loadAllData();
  } else {
    document.getElementById('pw-error').textContent = 'รหัสผ่านไม่ถูกต้อง';
    document.getElementById('pw-input').value = '';
  }
}

// ─── FETCH ────────────────────────────────────────────────
async function fetchTab(tab) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=${tab.headers}&sheet=${encodeURIComponent(tab.name)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
  return json.table;
}

function parseDateStr(s) {
  if (!s) return null;
  s = String(s).trim();
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) {
    const d = parseInt(m[1]), mo = parseInt(m[2]), yr = parseInt(m[3]);
    if (yr >= 2025 && yr <= 2027)
      return `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  const dm = s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dm) {
    const yr = parseInt(dm[1]), mo = parseInt(dm[2]) + 1, d = parseInt(dm[3]);
    if (yr >= 2025 && yr <= 2027)
      return `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  return null;
}

function parseTable(table) {
  const cols = table.cols;
  const rows = table.rows;
  const ci = (kws) => cols.findIndex(c => kws.some(k => c.label.toLowerCase().includes(k.toLowerCase())));

  const dateIdx      = ci(['Date']);
  const branchIdx    = ci(['Branch']);
  const custIdx      = ci(['CUSTOMER NAME', 'Customer']);
  const recipIdx     = ci(['Recipient']);
  const phoneIdx     = ci(['Phone']);
  const sizeIdx      = ci(['Size of the cake', 'Size']);
  const fl1Idx       = ci(['Flavors1', 'Flavor1']);
  const fl2Idx       = ci(['Flavors2', 'Flavor2']);
  const noteIdx      = ci(['Note']);
  const msgIdx       = ci(['Message on cake', 'Message']);
  const candleIdx    = ci(['Extra candle', 'candle']);
  const staffIdx     = ci(['Staff']);
  const priceIdx     = ci(['Price']);
  const extraIngIdx  = ci(['Extra ingredient']);
  const extraDrwIdx  = ci(['Extra drawing']);
  const totalIdx     = ci(['Total']);

  const orders = [];
  for (let i = 0; i < rows.length; i++) {
    if (!rows[i] || !rows[i].c) continue;
    const r = rows[i].c;
    const get    = idx => (idx >= 0 && r[idx] && r[idx].v != null) ? r[idx].v : null;
    const getFmt = idx => (idx >= 0 && r[idx] && r[idx].f != null) ? r[idx].f : null;
    const str    = idx => { const v = get(idx); return v ? String(v).trim() : ''; };

    const dateStr = parseDateStr(get(dateIdx));
    if (!dateStr) continue;
    const rawBranch = get(branchIdx);
    if (!rawBranch) continue;
    const branch = String(rawBranch).trim();
    const branchNorm = branch.toLowerCase().includes('ratch') || branch.toLowerCase().includes('circle')
      ? 'Ratchaphruek' : branch;

    let size = '';
    const sizeFmt = getFmt(sizeIdx);
    const sizeVal = get(sizeIdx);
    if (sizeFmt) {
      size = String(sizeFmt).trim();
    } else if (sizeVal) {
      const sv = String(sizeVal).trim();
      const dm = sv.match(/Date\(\d+,\d+,(\d+)\)/);
      if (dm) { const smap={'1':'1','2':'1/2','3':'1','4':'1/4','6':'1/6'}; size = smap[dm[1]]||sv; }
      else if (sv==='0.25') size='1/4';
      else if (sv==='0.5') size='1/2';
      else size=sv;
    }

    const rawTotal = get(totalIdx);
    const rawPrice = get(priceIdx);
    let totalNum = null;
    if (rawTotal !== null) {
      const t = parseFloat(String(rawTotal).replace(/,/g,''));
      if (!isNaN(t) && t > 0) totalNum = t;
    }
    if (totalNum === null && typeof rawPrice === 'number') totalNum = rawPrice;

    orders.push({
      date: dateStr,
      branch: branchNorm,
      customer: str(custIdx),
      recipient: str(recipIdx),
      phone: str(phoneIdx),
      size,
      flavor1: str(fl1Idx),
      flavor2: str(fl2Idx),
      note: str(noteIdx),
      message: str(msgIdx),
      candle: str(candleIdx),
      staff: str(staffIdx),
      price: typeof rawPrice === 'number' ? rawPrice : null,
      extraIng: str(extraIngIdx),
      extraDrw: str(extraDrwIdx),
      total: totalNum,
    });
  }
  return orders;
}

async function loadAllData() {
  document.getElementById('loading-state').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  chartsBuilt = false;
  destroyCharts();
  try {
    const results = await Promise.all(TABS.map(fetchTab));
    ALL_ORDERS = results.flatMap(parseTable);
    const seen = new Set();
    ALL_ORDERS = ALL_ORDERS.filter(o => {
      const key = `${o.date}|${o.branch}|${o.customer}`;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
    document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString('th-TH');
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    const months = [...new Set(ALL_ORDERS.map(o=>o.date.slice(0,7)))].sort();
    if (months.length) {
      const last = months[months.length-1].split('-');
      curYear = parseInt(last[0]); curMonth = parseInt(last[1]);
    }
    renderMetrics(); renderCalendar(); renderList();
  } catch(e) {
    document.getElementById('loading-state').innerHTML =
      `<div style="color:#C0392B;font-size:14px;">โหลดข้อมูลไม่สำเร็จ<br><small>${e.message}</small><br><br><button onclick="loadAllData()" style="padding:8px 16px;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-family:inherit;">ลองใหม่</button></div>`;
  }
}

function destroyCharts() {
  ['c-daily','c-branch','c-rev','c-size'].forEach(id => { const c=Chart.getChart(id); if(c)c.destroy(); });
}

// ─── METRICS ──────────────────────────────────────────────
function renderMetrics() {
  const mo = ALL_ORDERS.filter(o=>{ const d=new Date(o.date); return d.getFullYear()===curYear&&d.getMonth()+1===curMonth; });
  const rev = mo.filter(o=>o.total).reduce((s,o)=>s+o.total,0);
  const sam = mo.filter(o=>o.branch==='Samyan').length;
  const rat = mo.filter(o=>o.branch==='Ratchaphruek').length;
  const MONTH_TH=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('metrics-row').innerHTML = `
    <div class="metric-card"><div class="metric-label">ออเดอร์เดือนนี้</div><div class="metric-value">${mo.length}</div><div class="metric-sub">${MONTH_TH[curMonth]} ${curYear}</div></div>
    <div class="metric-card"><div class="metric-label">ยอดรวม (฿)</div><div class="metric-value">฿${rev.toLocaleString()}</div><div class="metric-sub">เฉพาะที่บันทึกราคา</div></div>
    <div class="metric-card"><div class="metric-label">Samyan</div><div class="metric-value">${sam}</div><div class="metric-sub">ออเดอร์</div></div>
    <div class="metric-card"><div class="metric-label">Ratchaphruek</div><div class="metric-value">${rat}</div><div class="metric-sub">ออเดอร์</div></div>`;
}

// ─── CALENDAR ─────────────────────────────────────────────
const MONTH_FULL=['','January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar() {
  document.getElementById('month-label').textContent = `${MONTH_FULL[curMonth]} ${curYear}`;
  renderMetrics();
  const byDay = {};
  ALL_ORDERS.forEach(o => {
    const d = new Date(o.date);
    if (d.getFullYear()===curYear && d.getMonth()+1===curMonth) {
      const day = d.getDate();
      if (!byDay[day]) byDay[day] = [];
      byDay[day].push(o);
    }
  });
  const firstDay = new Date(curYear, curMonth-1, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth, 0).getDate();
  const today = new Date().toISOString().slice(0,10);
  let html = '';
  for (let i=0;i<firstDay;i++) html += '<div class="cal-cell empty"></div>';
  for (let d=1;d<=daysInMonth;d++) {
    const ds = `${curYear}-${String(curMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const orders = byDay[d] || [];
    const samO = orders.filter(o=>o.branch==='Samyan');
    const ratO = orders.filter(o=>o.branch==='Ratchaphruek');
    let pills = '';
    samO.forEach(o => {
      const idx = ALL_ORDERS.indexOf(o);
      pills += `<span class="order-pill pill-samyan" onclick="openModal(${idx})">${o.customer||'–'}</span>`;
    });
    ratO.forEach(o => {
      const idx = ALL_ORDERS.indexOf(o);
      pills += `<span class="order-pill pill-ratch" onclick="openModal(${idx})">${o.customer||'–'}</span>`;
    });
    html += `<div class="cal-cell${ds===today?' today':''}"><div class="day-num">${d}</div>${pills}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function prevMonth() { curMonth--; if(curMonth<1){curMonth=12;curYear--;} renderCalendar(); }
function nextMonth() { curMonth++; if(curMonth>12){curMonth=1;curYear++;} renderCalendar(); }

// ─── LIST ─────────────────────────────────────────────────
function renderList() {
  const bf = document.getElementById('f-branch').value;
  const mf = document.getElementById('f-month').value;
  let data = [...ALL_ORDERS].sort((a,b)=>a.date.localeCompare(b.date));
  if (bf) data = data.filter(o=>o.branch===bf);
  if (mf) data = data.filter(o=>new Date(o.date).getMonth()+1===parseInt(mf));
  document.getElementById('list-count').textContent = `${data.length} ออเดอร์`;
  const html = data.map(o => {
    const idx = ALL_ORDERS.indexOf(o);
    const d = new Date(o.date);
    const ds = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    const isSam = o.branch==='Samyan';
    const flavors = [o.flavor1, o.flavor2].filter(Boolean).join(' / ');
    return `<div class="table-row" onclick="openModal(${idx})">
      <span style="color:#888;font-size:11px;">${ds}</span>
      <span><span class="branch-tag ${isSam?'tag-samyan':'tag-ratch'}">${o.branch}</span></span>
      <span class="cell-truncate">${o.customer||'–'}</span>
      <span style="color:#888;">${o.size||'–'}</span>
      <span class="cell-truncate" style="color:#888;">${flavors||'–'}</span>
      <span style="color:#888;">${o.staff||'–'}</span>
      <span style="font-weight:500;">${o.total?'฿'+o.total.toLocaleString():'–'}</span>
    </div>`;
  }).join('');
  document.getElementById('list-body').innerHTML = html || '<div style="padding:32px;text-align:center;color:#aaa;">ไม่มีข้อมูล</div>';
}

// ─── MODAL ────────────────────────────────────────────────
function openModal(idx) {
  const o = ALL_ORDERS[idx];
  if (!o) return;
  const d = new Date(o.date);
  const ds = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  const isSam = o.branch==='Samyan';
  const flavors = [o.flavor1, o.flavor2].filter(Boolean).join(' + ');

  const field = (label, val, full=false) => val
    ? `<div class="modal-field${full?' full':''}"><div class="modal-field-label">${label}</div><div class="modal-field-value">${val}</div></div>` : '';

  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">${o.customer||'–'}</div>
    <div class="modal-date">
      <span style="background:${isSam?'var(--samyan-bg)':'var(--ratch-bg)'};color:${isSam?'var(--samyan-text)':'var(--ratch-text)'};padding:2px 10px;border-radius:5px;font-size:12px;font-weight:500;">${o.branch}</span>
      &nbsp; ${ds}
    </div>
    <div class="modal-grid">
      ${field('ชื่อผู้รับ', o.recipient)}
      ${field('เบอร์โทร', o.phone)}
      ${field('ขนาดเค้ก', o.size)}
      ${field('Staff', o.staff)}
      ${field('รสชาติ', flavors, true)}
      ${field('ข้อความบนเค้ก', o.message, true)}
      ${field('Note', o.note, true)}
      ${field('เทียน', o.candle)}
      ${field('Extra ingredient', o.extraIng)}
      ${field('Extra drawing', o.extraDrw)}
    </div>
    <div class="modal-price-row">
      ${o.price ? `<div class="modal-price-item"><div class="modal-price-label">ราคาเค้ก</div><div class="modal-price-value">฿${o.price.toLocaleString()}</div></div>` : ''}
      ${o.extraIng ? `<div class="modal-price-item"><div class="modal-price-label">Extra ing.</div><div class="modal-price-value">${o.extraIng}</div></div>` : ''}
      ${o.extraDrw ? `<div class="modal-price-item"><div class="modal-price-label">Extra drw.</div><div class="modal-price-value">${o.extraDrw}</div></div>` : ''}
      ${o.total ? `<div class="modal-price-item total"><div class="modal-price-label">Total</div><div class="modal-price-value">฿${o.total.toLocaleString()}</div></div>` : ''}
    </div>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ─── CHARTS ───────────────────────────────────────────────
function buildCharts() {
  if (chartsBuilt) return; chartsBuilt = true;
  const months=[4,5,6], ML=['เม.ย.','พ.ค.','มิ.ย.'];
  const sam=months.map(m=>ALL_ORDERS.filter(o=>o.branch==='Samyan'&&new Date(o.date).getMonth()+1===m).length);
  const rat=months.map(m=>ALL_ORDERS.filter(o=>o.branch==='Ratchaphruek'&&new Date(o.date).getMonth()+1===m).length);
  const rev=months.map(m=>ALL_ORDERS.filter(o=>o.total&&new Date(o.date).getMonth()+1===m).reduce((s,o)=>s+o.total,0));
  const byDay={};
  ALL_ORDERS.filter(o=>o.date>='2026-04-01'&&o.date<='2026-06-30').forEach(o=>{byDay[o.date]=(byDay[o.date]||0)+1;});
  const dd=Object.keys(byDay).sort();
  const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};
  new Chart(document.getElementById('c-daily'),{type:'bar',data:{labels:dd.map(d=>{const dt=new Date(d);return `${dt.getDate()}/${dt.getMonth()+1}`;}),datasets:[{data:dd.map(d=>byDay[d]),backgroundColor:'#F5C4A0',borderColor:'#E8703A',borderWidth:1}]},options:{...opts,scales:{x:{ticks:{font:{size:9},maxRotation:45,maxTicksLimit:20}},y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  new Chart(document.getElementById('c-branch'),{type:'bar',data:{labels:ML,datasets:[{label:'Samyan',data:sam,backgroundColor:'#F5C4A0'},{label:'Ratchaphruek',data:rat,backgroundColor:'#C8E6C9'}]},options:{...opts,plugins:{legend:{display:true,position:'top',labels:{font:{size:11},boxWidth:12}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  new Chart(document.getElementById('c-rev'),{type:'bar',data:{labels:ML,datasets:[{data:rev,backgroundColor:['#F5C4A0','#C8E6C9','#D4C5F9']}]},options:{...opts,scales:{y:{beginAtZero:true,ticks:{callback:v=>'฿'+v.toLocaleString(),font:{size:10}}}}}});
  const sc={};ALL_ORDERS.forEach(o=>{if(o.size&&o.size.trim())sc[o.size]=(sc[o.size]||0)+1;});
  const ts=Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0,6);
  new Chart(document.getElementById('c-size'),{type:'doughnut',data:{labels:ts.map(s=>s[0]),datasets:[{data:ts.map(s=>s[1]),backgroundColor:['#E8703A','#F5C4A0','#2E9E54','#C8E6C9','#7E6AD6','#D4C5F9']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},padding:8,boxWidth:12}}}}});
}

function switchTab(id, btn) {
  ['cal','list','chart'].forEach(t=>document.getElementById(`tab-${t}`).classList.toggle('hidden',t!==id));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(id==='chart') buildCharts();
}
</script>
